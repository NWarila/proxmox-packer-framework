---
# Ansible-lint configuration for Packer provisioning playbooks

# Paths to lint
parseable: true

# Skip rules that conflict with Packer provisioning patterns
skip_list:
  # Packer-managed playbooks don't need role metadata
  - meta-no-info
  # Packer handles become via SSH user, not playbook-level
  - no-changed-when
  # Template tasks often use command/shell for packer-specific operations
  - command-instead-of-module
  # Packer roles are single-purpose; naming conventions are relaxed
  - name[missing]

# Only lint the ansible directory
exclude_paths:
  - .github/
  - .config/
  - examples/
  - packer/data/
  - packer/templates/
